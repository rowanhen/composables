name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format:check
      - name: Typecheck
        run: bun run typecheck
      - name: Check arbitrary Tailwind values
        continue-on-error: true
        run: bun src/scripts/lint-no-arbitrary.ts src showcase/src
      - name: Verify generated CSS
        run: bun scripts/generate-css.ts --check
      - name: Verify generated preset CSS
        run: bun scripts/generate-preset-css.ts --check
      - name: Test token system
        run: bun run test:tokens
      - name: Build CSS
        run: bun run build:css
      - name: Test downstream CSS
        run: bun run test:css
      - name: Build showcase
        run: bunx vite build showcase
