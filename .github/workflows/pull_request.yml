name: Pull Request
on:
  pull_request:

jobs:
  pull-request:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Node
        uses: marshmallow-insurance/campfire/.github/actions/setup-node-project@main
      - name: Run Check Types
        run: |
          npm run check-types
      - name: Run Tests
        run: |
          npm run test