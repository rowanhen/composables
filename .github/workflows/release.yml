name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - package.json
      - bun.lock
      - src/**
      - rules/**
      - scripts/**
      - .github/workflows/release.yml

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - name: Publish package from Conventional Commits
        run: bun scripts/release-package.ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
