name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline)
          fi

          # Determine bump type from conventional commits
          if echo "$COMMITS" | grep -qE "^[a-f0-9]+ (feat|fix|refactor|perf|docs|style|test|build|ci|chore|revert)(\(.+\))?!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ feat(\(.+\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Sync version from npm registry
        working-directory: packages/cli
        run: |
          # Ensure local version matches what's actually on npm to prevent desync
          NPM_VERSION=$(npm view @leitware/composables-cli version 2>/dev/null || echo "0.0.0")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          if [ "$NPM_VERSION" != "$LOCAL_VERSION" ]; then
            echo "Version desync detected: local=$LOCAL_VERSION npm=$NPM_VERSION — syncing to npm version"
            npm version "$NPM_VERSION" --no-git-tag-version --allow-same-version > /dev/null 2>&1
          fi

      - name: Bump version
        id: version
        working-directory: packages/cli
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version > /dev/null 2>&1
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

      - name: Publish to npm
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          # Skip publish if this version already exists on npm
          PUBLISHED=$(npm view "@leitware/composables-cli@${{ steps.version.outputs.version }}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "${{ steps.version.outputs.version }}" ]; then
            echo "Version ${{ steps.version.outputs.version }} already published — skipping"
          else
            npm publish --provenance --access public
          fi

