name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --oneline)
          fi

          if echo "$COMMITS" | grep -qE "^[a-f0-9]+ (feat|fix|refactor|perf|docs|style|test|build|ci|chore|revert)(\(.+\))?!:"; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif echo "$COMMITS" | grep -qE "^[a-f0-9]+ feat(\(.+\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Sync version from npm registry
        working-directory: packages/ui
        run: |
          NPM_VERSION=$(npm view @leitware/composables version 2>/dev/null || echo "")
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          if [ -z "$NPM_VERSION" ]; then
            echo "Package not yet published — using local version $LOCAL_VERSION"
          elif [ "$NPM_VERSION" != "$LOCAL_VERSION" ]; then
            echo "Version desync detected: local=$LOCAL_VERSION npm=$NPM_VERSION — syncing to npm version"
            npm version "$NPM_VERSION" --no-git-tag-version --allow-same-version > /dev/null 2>&1
          fi

      - name: Bump version
        id: version
        working-directory: packages/ui
        run: |
          BUMP_TYPE="${{ steps.bump.outputs.type }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const [major, minor, patch] = pkg.version.split('.').map(Number);
            if ('$BUMP_TYPE' === 'major') pkg.version = \`\${major+1}.0.0\`;
            else if ('$BUMP_TYPE' === 'minor') pkg.version = \`\${major}.\${minor+1}.0\`;
            else pkg.version = \`\${major}.\${minor}.\${patch+1}\`;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log(pkg.version);
          "
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: bun run build

      - name: Publish to npm
        working-directory: packages/ui
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PUBLISHED=$(npm view "@leitware/composables@${{ steps.version.outputs.version }}" version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "${{ steps.version.outputs.version }}" ]; then
            echo "Version ${{ steps.version.outputs.version }} already published — skipping"
          else
            npm publish --provenance --access public
          fi
